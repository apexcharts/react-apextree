<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ApexTree Test - Expand Collapse</title>
    <script src="./node_modules/apextree/apextree.min.js"></script>
    <style>
      /* Same reset as our React demo */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      *:not(svg *) {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
        background-color: #f5f5f5;
        color: #333;
      }
      .tree-container {
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        overflow: hidden;
        background: #fafafa;
        margin: 20px;
      }
    </style>
  </head>
  <body>
    <h2 style="padding: 20px">Test: With CSS Reset (like React demo)</h2>
    <div class="tree-container">
      <div id="svg-tree"></div>
    </div>

    <script>
      const data = {
        id: "company",
        name: "TechCorp Inc.",
        children: [
          {
            id: "engineering",
            name: "Engineering",
            children: [
              { id: "frontend", name: "Frontend" },
              { id: "backend", name: "Backend" },
            ],
          },
          {
            id: "product",
            name: "Product",
            children: [
              { id: "pm1", name: "Product Managers" },
              { id: "design", name: "Design" },
            ],
          },
        ],
      };

      const options = {
        width: 900,
        height: 500,
        direction: "top",
        nodeWidth: 120,
        nodeHeight: 45,
        childrenSpacing: 70,
        siblingSpacing: 20,
        enableExpandCollapse: true,
        highlightOnHover: true,
        enableToolbar: true,
        nodeBGColor: "#fff",
        borderColor: "#5c6bc0",
        borderColorHover: "#3949ab",
        fontColor: "#333",
      };

      const tree = new ApexTree(document.getElementById("svg-tree"), options);
      tree.render(data);
    </script>
  </body>
</html>
